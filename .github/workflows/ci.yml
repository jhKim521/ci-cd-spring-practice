name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 가져오기
      - name: 코드 가져오기
        uses: actions/checkout@v4

      # 2. JDK 설정
      - name: JDK 설정
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      # 3. Gradle 실행 권한
      - name: Gradle 실행 권한
        run: chmod +x gradlew

      # 4. Build (jar 생성)
      - name: Build (jar 생성)
        run: ./gradlew clean build -x test

      # 5. 빌드 결과 확인
      - name: 빌드 결과 확인
        run: ls -al build/libs

      # 6. jar 파일 이름 고정
      - name: jar 이름 변경
        run: |
          mkdir -p deploy
          cp build/libs/*SNAPSHOT.jar deploy/springApp.jar

      # 7. jar 업로드
      - name: Upload JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "deploy/springApp.jar"
          target: "/home/ubuntu/app"

      # 8. EC2에서 실행
      - name: EC2에서 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            echo "Stopping existing process..."
            pkill -f springApp.jar || true
            chmod +x /home/ubuntu/app/deploy/springApp.jar
            echo "Starting new application..."
            nohup java -jar /home/ubuntu/app/deploy/springApp.jar > app.log 2>&1 &
            

